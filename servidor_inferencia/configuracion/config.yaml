# Configuración de Entrenamiento y Modelo para Detección de Anomalías

data:
  train_path: "datos/brutos/train_vibrations_normal.csv"
  test_normal_path: "datos/brutos/test_vibrations_normal.csv"
  test_anomaly_path: "datos/brutos/test_vibrations_anomaly.csv"
  window_size: 100
  step: 50
  sample_rate_hz: 50

model:
  in_channels: 3
  encoder_filters: [16, 32, 64]
  kernel_size: 5

training:
  batch_size: 256
  learning_rate: 0.001
  epochs: 100
  seed: 42
  validation_split: 0.2

inference:
  threshold: 0.005
  threshold_quantile: 0.999
  min_anomaly_ratio: 0.02
  severe_threshold_multiplier: 3.0

logging:
  project_name: "train-anomaly-detection"
  run_name: "run-10-threshold-0999"
